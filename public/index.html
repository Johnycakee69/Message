<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: #27272a;
      --accent: #6ee7b7;
      --accent2: #34d399;
      --me: #059669;
      --them: #27272a;
      --text: #f4f4f5;
      --muted: #71717a;
      --danger: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── JOIN SCREEN ── */
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeUp 0.5s ease both;
    }

    #join-screen h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -1px;
      color: var(--accent);
    }

    #join-screen p {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    #join-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    #join-form input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #join-form input:focus { border-color: var(--accent); }

    #join-form button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #join-form button:hover { background: var(--accent2); transform: translateY(-1px); }
    #join-form button:active { transform: translateY(0); }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100vh;
      max-height: 780px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.4s ease both;
    }

    /* Header */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }

    .chat-header-left { display: flex; align-items: center; gap: 12px; }

    .logo-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .chat-header h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .chat-header .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    #online-count {
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(110, 231, 183, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      animation: bubbleIn 0.2s ease both;
    }

    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.them { align-self: flex-start; align-items: flex-start; }

    .msg-name {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 4px;
      font-family: 'DM Mono', monospace;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
    }

    .me .bubble {
      background: var(--me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .them .bubble {
      background: var(--them);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* System messages */
    .system-msg {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 6px 0;
      animation: fadeIn 0.3s ease both;
    }

    /* Typing indicator */
    #typing-indicator {
      min-height: 24px;
      padding: 4px 20px;
      font-size: 0.75rem;
      color: var(--accent);
      font-style: italic;
      transition: opacity 0.2s;
    }

    /* Input area */
    .chat-input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #000;
      width: 42px; height: 42px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.92) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen">
    <h1>💬 Messenger</h1>
    <p>Enter your name to start chatting.<br>Share the link with someone to chat in real time.</p>
    <div id="join-form">
      <input type="text" id="username-input" placeholder="Your name..." maxlength="20" autocomplete="off" />
      <button onclick="joinChat()">Join Chat →</button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="logo-dot">💬</div>
        <div>
          <h2>Live Messenger</h2>
          <div class="subtitle" id="my-name-display"></div>
        </div>
      </div>
      <div id="online-count">● 1 online</div>
    </div>

    <div id="messages"></div>

    <div id="typing-indicator"></div>

    <div class="chat-input-area">
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myUsername = '';
    let typingTimeout;

    // ── JOIN ──
    document.getElementById('username-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinChat();
    });

    function joinChat() {
      const input = document.getElementById('username-input');
      const name = input.value.trim();
      if (!name) return;
      myUsername = name;

      socket.emit('join', name);

      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('my-name-display').textContent = `Logged in as ${name}`;
      document.getElementById('msg-input').focus();
    }

    // ── SEND ──
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      socket.emit('send_message', { text });
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      // Stop typing
      socket.emit('typing', false);
      clearTimeout(typingTimeout);
    }

    // ── INPUT EVENTS ──
    const msgInput = document.getElementById('msg-input');

    msgInput.addEventListener('input', () => {
      // Enable/disable send button
      document.getElementById('send-btn').disabled = msgInput.value.trim() === '';

      // Auto-resize textarea
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';

      // Typing indicator
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('typing', false), 1500);
    });

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── RECEIVE MESSAGE ──
    socket.on('receive_message', (msg) => {
      const isMe = msg.username === myUsername;
      addBubble(msg, isMe);
    });

    function addBubble(msg, isMe) {
      const messages = document.getElementById('messages');

      const row = document.createElement('div');
      row.className = `msg-row ${isMe ? 'me' : 'them'}`;

      if (!isMe) {
        const name = document.createElement('div');
        name.className = 'msg-name';
        name.textContent = msg.username;
        row.appendChild(name);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = msg.text;
      row.appendChild(bubble);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = msg.time;
      row.appendChild(time);

      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── SYSTEM MESSAGES ──
    socket.on('system_message', (text) => {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    });

    // ── TYPING INDICATOR ──
    socket.on('user_typing', ({ username, isTyping }) => {
      const el = document.getElementById('typing-indicator');
      el.textContent = isTyping ? `${username} is typing...` : '';
    });

    // ── ONLINE COUNT ──
    socket.on('user_list', (users) => {
      document.getElementById('online-count').textContent = `● ${users.length} online`;
    });
  </script>
</body>
</html>
